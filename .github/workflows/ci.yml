name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all modules
        run: |
          python -m py_compile app.py
          python -m py_compile pages/01_analysis.py
          python -m py_compile pages/02_history.py
          python -m py_compile services/pdf_service.py
          python -m py_compile services/claim_service.py
          python -m py_compile services/search_service.py
          python -m py_compile services/verification_service.py
          python -m py_compile services/report_service.py
          python -m py_compile utils/config.py
          python -m py_compile utils/helpers.py
          python -m py_compile utils/styles.py
          python -m py_compile utils/retry.py
          echo "All syntax checks passed"

      - name: Verify imports
        run: |
          python -c "
          from google import genai
          import fitz
          import pandas
          import plotly
          from tavily import TavilyClient
          from dotenv import load_dotenv
          print('All imports OK')
          "

      - name: Run unit tests
        env:
          GEMINI_API_KEY: "dummy-key-for-ci"
          TAVILY_API_KEY: "dummy-key-for-ci"
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests directory found — skipping"
